<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIU Personel Giriş-Çıkış Sistemi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #4a90e2;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #357abd;
        }
        #status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #e2e3e5; color: #383d41; }
    </style>
</head>
<body>

<div class="card">
    <h2>Personel Giriş Sistemi</h2>
    
    <div class="input-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
    </div>

    <div class="input-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" placeholder="Şifrenizi girin">
    </div>

    <button class="btn" onclick="islemYap()">Giriş / Çıkış Yap</button>

    <div id="status"></div>
</div>

<script>
    // QR terminalinden link ile gelen parametreleri otomatik yakalıyoruz
    const urlParams = new URLSearchParams(window.location.search);
    const kapiId = urlParams.get('kapi') || "1"; // Eğer URL'de yoksa default 1 alacak
    const qrToken = urlParams.get('token') || "manuel_mobil_test";

    function islemYap() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const statusDiv = document.getElementById('status');

        if (!username || !password) {
            statusDiv.innerText = 'Lütfen kullanıcı adı ve şifrenizi girin!';
            statusDiv.className = 'error';
            statusDiv.style.display = 'block';
            return;
        }

        statusDiv.innerText = 'Konum alınıyor ve doğrulanıyor...';
        statusDiv.className = 'info';
        statusDiv.style.display = 'block';

        // Telefondan GPS Konumunu İsteme
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;

                    // Backend'in beklediği JSON paketi
                    const veriPaketi = {
                        username: username,
                        password: password,
                        sirket_konum_id: Number(kapiId),
                        qr_token: qrToken,
                        latitude: latitude,
                        longitude: longitude
                    };

                    try {
                        // Canlıdaki Edge Function URL'n (check-in)
                        const response = await fetch('https://tcewauvsdecrhjznlkmt.supabase.co/functions/v1/check-in', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(veriPaketi)
                        });

                        const data = await response.json();

                        if (data.success) {
                            statusDiv.innerText = `${data.message} (Mesafe: ${data.mesafe} metre)`;
                            statusDiv.className = 'success';
                        } else {
                            statusDiv.innerText = `Hata: ${data.message}`;
                            statusDiv.className = 'error';
                        }

                    } catch (err) {
                        statusDiv.innerText = 'Sunucuya bağlanırken bir hata oluştu!';
                        statusDiv.className = 'error';
                        console.error(err);
                    }
                },
                (error) => {
                    statusDiv.innerText = 'GPS Konum izni reddedildi veya konum alınamadı!';
                    statusDiv.className = 'error';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            statusDiv.innerText = 'Tarayıcınız konum bilgisini desteklemiyor!';
            statusDiv.className = 'error';
        }
    }
</script>

</body>
</html>
